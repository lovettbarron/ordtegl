short_description: "Ordtegl is a free Danish vocabulary and grammar learning app with spaced repetition, exam-date pacing, and camera OCR — built for PD3 and PD2 exam preparation."

long_description: |
  Ordtegl helps Danish language learners master vocabulary and grammar for Prove i Dansk 3 (PD3) and Prove i Dansk 2 (PD2) exams. With 3,300+ vocabulary items across 32 CEFR-aligned levels (A1-B2) and 40 grammar topics with 414 interactive exercises, learners get structured preparation tailored to their exam date.

  The app uses the FSRS spaced repetition algorithm to optimize review timing, ensuring efficient long-term retention. Exam-date pacing calculates daily study goals so learners stay on track. Camera OCR lets users photograph Danish text and add new words instantly. Custom word lists let learners build personal vocabulary from real-world encounters.

  Ordtegl is completely free — no ads, no subscriptions, no in-app purchases. The app is fully offline and requires no account or sign-in. Built for iOS with a calm, focused interface designed to make daily study a habit.

